name: meilisearch

services:
  meilisearch:
    image: getmeili/meilisearch:v1.37
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meili-data:/data
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili-local-master-key}
      MEILI_HTTP_ADDR: 0.0.0.0:7700
      MEILI_DB_PATH: /data/meili_data
      MEILI_NO_ANALYTICS: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ./ui
    depends_on:
      meilisearch:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    ports:
      - "${MEILI_UI_PORT:-3000}:3000"
    environment:
      MEILI_URL: http://meilisearch:7700

  seed:
    image: node:22-alpine
    depends_on:
      meilisearch:
        condition: service_healthy
    volumes:
      - ./seed/seed.mjs:/tmp/seed.mjs:ro
      - ./seed/books.json:/tmp/books.json:ro
    environment:
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili-local-master-key}
    command: ["node", "/tmp/seed.mjs"]
    restart: "no"

volumes:
  meili-data:
