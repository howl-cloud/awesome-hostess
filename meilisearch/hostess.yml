version: "1.0"
name: meilisearch
description: Meilisearch search API with a basic user-facing search console.

services:
  meilisearch:
    type: custom
    image: getmeili/meilisearch:v1.37
    retention: permanent
    ports:
      - 7700
    resources: medium
    health:
      http: /health
      interval: 10s
      timeout: 5s
      retries: 6
    env:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${secret:MEILI_MASTER_KEY}
      MEILI_HTTP_ADDR: 0.0.0.0:7700
      MEILI_DB_PATH: /data/meili_data
      MEILI_NO_ANALYTICS: "true"

  ui:
    type: nextjs
    image: ghcr.io/howl-cloud/awesome-hostess/meilisearch-ui:latest
    depends_on:
      meilisearch:
        condition: healthy
      seed-meilisearch:
        condition: completed
    ports:
      - port: 3000
        public: true
    resources: small
    health:
      http: /
      interval: 10s
      timeout: 5s
      retries: 6
    env:
      MEILI_URL: ${meilisearch.url}

jobs:
  seed-meilisearch:
    image: node:22-alpine
    depends_on:
      meilisearch:
        condition: healthy
    run: once
    timeout: 2m
    resources: small
    files:
      - name: seed-script
        mount: /tmp/seed.mjs
        source: ./seed/seed.mjs
      - name: seed-documents
        mount: /tmp/books.json
        source: ./seed/books.json
    env:
      MEILI_URL: ${meilisearch.url}
      MEILI_MASTER_KEY: ${secret:MEILI_MASTER_KEY}
    entrypoint: ["node"]
    command: ["/tmp/seed.mjs"]
