version: "1.0"
name: buzz
description: Block's Slack alternative

services:
  postgres:
    type: postgres
    resources: medium
    retention: permanent
    backups:
      schedule: daily
      retention: 14
      pitr: true
    special:
      version: "17"

  redis:
    type: redis
    resources: small
    retention: permanent
    backups:
      schedule: daily
      retention: 7
    special:
      version: "8"
      maxmemory_percent: 75
      maxmemory_policy: noeviction

  minio:
    type: custom
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    env:
      MINIO_ROOT_USER: ${secret:MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${secret:MINIO_ROOT_PASSWORD}
    ports:
      - port: 9000        # S3 API — declared first so the HTTP health probe targets it
        visibility: private
      - port: 9001        # web console — gated behind Hostess SSO (org members only)
        visibility: team
    resources: small
    persistence:
      - name: minio-data
        mount: /data
        size: 25Gi
    health:
      http: /minio/health/live
      interval: 5s
      timeout: 3s
      retries: 10

  relay:
    type: custom
    image: ghcr.io/block/buzz:sha-7e34bee
    visibility: public
    ports:
      - port: 3000
        visibility: public
      - port: 8080
        visibility: private
      - port: 9102
        visibility: private
    env:
      BUZZ_BIND_ADDR: 0.0.0.0:3000
      BUZZ_HEALTH_PORT: "8080"
      BUZZ_METRICS_PORT: "9102"
      DATABASE_URL: ${postgres.url}
      REDIS_URL: ${redis.url}
      BUZZ_S3_ENDPOINT: ${minio.port_1.url}
      BUZZ_S3_ACCESS_KEY: ${secret:MINIO_ROOT_USER}
      BUZZ_S3_SECRET_KEY: ${secret:MINIO_ROOT_PASSWORD}
      BUZZ_S3_BUCKET: buzz-media
      BUZZ_S3_REGION: us-east-1
      BUZZ_GIT_REPO_PATH: /data/git
      BUZZ_AUTO_MIGRATE: "true"
      BUZZ_GIT_CONFORMANCE_PROBE: "true"
      BUZZ_REQUIRE_AUTH_TOKEN: "true"
      BUZZ_REQUIRE_RELAY_MEMBERSHIP: "true"
      BUZZ_ALLOW_NIP_OA_AUTH: "true"
      RELAY_OWNER_PUBKEY: ${secret:RELAY_OWNER_PUBKEY}
      BUZZ_RELAY_PRIVATE_KEY: ${secret:BUZZ_RELAY_PRIVATE_KEY}
      BUZZ_GIT_HOOK_HMAC_SECRET: ${secret:BUZZ_GIT_HOOK_HMAC_SECRET}
      RELAY_URL: wss://${relay.external_host}
      BUZZ_MEDIA_BASE_URL: ${relay.external_url}/media
      BUZZ_MEDIA_SERVER_DOMAIN: ${relay.external_host}
      BUZZ_CORS_ORIGINS: ${relay.external_url}
      RUST_LOG: buzz_relay=info,buzz_db=info,buzz_auth=info,buzz_pubsub=info,tower_http=info
    depends_on:
      - postgres
      - redis
      - minio
      - bootstrap-minio
    replicas: 1
    resources: medium
    persistence:
      mount: /data/git
      size: 20Gi
      owner: "1000:1000"
    health:
      command: "curl -fsS http://127.0.0.1:8080/_readiness"
      interval: 10s
      timeout: 5s
      retries: 12

jobs:
  bootstrap-minio:
    image: minio/mc:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/buzz-media
        echo "bucket buzz-media ready"
    env:
      MINIO_ENDPOINT: ${minio.port_1.url}
      MINIO_ROOT_USER: ${secret:MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${secret:MINIO_ROOT_PASSWORD}
    depends_on:
      - minio
    run: on_deploy
    timeout: 5m
    retries: 3
