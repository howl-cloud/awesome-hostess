version: "1.0"
name: flowise
description: Flowise on Hostess

services:
  db:
    type: postgres
    retention: permanent
    resources:
      preset: small
      storage: 10Gi
    backups:
      schedule: daily
      retention: 14

  garage:
    type: custom
    image: dxflrs/garage:v2.3.0
    retention: permanent
    files:
      - name: garage-config
        mount: /etc/garage.toml
        source: ./garage.toml
    ports:
      - 3900
    resources: small
    entrypoint: ["/garage"]
    command: ["server", "--single-node", "--default-bucket"]
    health:
      command: /garage status
      interval: 10s
      timeout: 5s
      retries: 10
    env:
      GARAGE_CONFIG_FILE: /etc/garage.toml
      GARAGE_DEFAULT_BUCKET: flowise
      GARAGE_DEFAULT_ACCESS_KEY: ${secret:FLOWISE_S3_ACCESS_KEY_ID}
      GARAGE_DEFAULT_SECRET_KEY: ${secret:FLOWISE_S3_SECRET_ACCESS_KEY}

  flowise:
    type: custom
    image: flowiseai/flowise:latest
    depends_on:
      db:
        condition: healthy
      garage:
        condition: healthy
    retention: permanent
    ports:
      - port: 3000
        public: true
    resources: medium
    health:
      http: /ping
      interval: 15s
      timeout: 5s
      retries: 10
    env:
      PORT: "3000"
      APP_URL: ${flowise.external_url}

      JWT_AUTH_TOKEN_SECRET: ${secret:FLOWISE_JWT_AUTH_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_SECRET: ${secret:FLOWISE_JWT_REFRESH_TOKEN_SECRET}
      EXPRESS_SESSION_SECRET: ${secret:FLOWISE_EXPRESS_SESSION_SECRET}

      DATABASE_TYPE: postgres
      DATABASE_HOST: ${db.host}
      DATABASE_PORT: ${db.port}
      DATABASE_NAME: ${db.database}
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${db.password}
      DATABASE_SSL: "false"

      STORAGE_TYPE: s3
      S3_STORAGE_BUCKET_NAME: flowise
      S3_STORAGE_ACCESS_KEY_ID: ${secret:FLOWISE_S3_ACCESS_KEY_ID}
      S3_STORAGE_SECRET_ACCESS_KEY: ${secret:FLOWISE_S3_SECRET_ACCESS_KEY}
      S3_STORAGE_REGION: garage
      S3_ENDPOINT_URL: ${garage.url}
      S3_FORCE_PATH_STYLE: "true"
      LOG_PATH: /data/logs
      SECRETKEY_STORAGE_TYPE: local
      SECRETKEY_PATH: /data/secret
      FLOWISE_SECRETKEY_OVERWRITE: ${secret:FLOWISE_SECRET_KEY}

      LOG_LEVEL: info
      CUSTOM_MCP_SECURITY_CHECK: "true"
      HTTP_SECURITY_CHECK: "true"
      SECURE_COOKIES: "false"
