version: "1.0"
name: flowise
description: Flowise visual LLM builder backed by Hostess-managed Postgres and Garage S3 storage.

services:
  db:
    type: postgres
    retention: permanent
    resources:
      preset: large
      storage: 50Gi
    backups:
      schedule: daily
      retention: 14

  garage:
    type: custom
    image: dxflrs/garage:v2.2.0
    retention: permanent
    ports:
      - 3900
    resources: large
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu

        : "${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}"
        : "${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}"
        : "${GARAGE_METRICS_TOKEN:?GARAGE_METRICS_TOKEN is required}"
        : "${GARAGE_DEFAULT_ACCESS_KEY:?GARAGE_DEFAULT_ACCESS_KEY is required}"
        : "${GARAGE_DEFAULT_SECRET_KEY:?GARAGE_DEFAULT_SECRET_KEY is required}"
        : "${GARAGE_DEFAULT_BUCKET:?GARAGE_DEFAULT_BUCKET is required}"

        mkdir -p /data/meta /data/data

        cat >/etc/garage.toml <<EOF
        metadata_dir = "/data/meta"
        data_dir = "/data/data"
        db_engine = "sqlite"
        replication_factor = 1
        rpc_bind_addr = "[::]:3901"
        rpc_public_addr = "127.0.0.1:3901"
        rpc_secret = "${GARAGE_RPC_SECRET}"

        [s3_api]
        s3_region = "${GARAGE_S3_REGION:-garage}"
        api_bind_addr = "[::]:3900"
        root_domain = ".s3.garage.localhost"

        [s3_web]
        bind_addr = "[::]:3902"
        root_domain = ".web.garage.localhost"

        [admin]
        api_bind_addr = "[::]:3903"
        admin_token = "${GARAGE_ADMIN_TOKEN}"
        metrics_token = "${GARAGE_METRICS_TOKEN}"
        EOF

        export GARAGE_CONFIG_FILE=/etc/garage.toml

        exec /garage server --single-node --default-bucket
    health:
      command: /garage status
      interval: 10s
      timeout: 5s
      retries: 10
    env:
      GARAGE_RPC_SECRET: ${secret:GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${secret:GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN: ${secret:GARAGE_METRICS_TOKEN}
      GARAGE_S3_REGION: garage
      GARAGE_DEFAULT_BUCKET: flowise
      GARAGE_DEFAULT_ACCESS_KEY: ${secret:FLOWISE_S3_ACCESS_KEY_ID}
      GARAGE_DEFAULT_SECRET_KEY: ${secret:FLOWISE_S3_SECRET_ACCESS_KEY}

  flowise:
    type: custom
    image: flowiseai/flowise:latest
    depends_on:
      db:
        condition: healthy
      garage:
        condition: healthy
    retention: permanent
    ports:
      - port: 3000
        public: true
    resources: large
    health:
      http: /ping
      interval: 15s
      timeout: 5s
      retries: 10
    env:
      PORT: "3000"
      APP_URL: ${flowise.external_url}

      FLOWISE_USERNAME: ${secret:FLOWISE_USERNAME}
      FLOWISE_PASSWORD: ${secret:FLOWISE_PASSWORD}
      JWT_AUTH_TOKEN_SECRET: ${secret:FLOWISE_JWT_AUTH_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_SECRET: ${secret:FLOWISE_JWT_REFRESH_TOKEN_SECRET}
      EXPRESS_SESSION_SECRET: ${secret:FLOWISE_EXPRESS_SESSION_SECRET}

      DATABASE_TYPE: postgres
      DATABASE_HOST: ${db.host}
      DATABASE_PORT: ${db.port}
      DATABASE_NAME: ${db.database}
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${db.password}
      DATABASE_SSL: "false"

      STORAGE_TYPE: s3
      S3_STORAGE_BUCKET_NAME: flowise
      S3_STORAGE_ACCESS_KEY_ID: ${secret:FLOWISE_S3_ACCESS_KEY_ID}
      S3_STORAGE_SECRET_ACCESS_KEY: ${secret:FLOWISE_S3_SECRET_ACCESS_KEY}
      S3_STORAGE_REGION: garage
      S3_ENDPOINT_URL: ${garage.url}
      S3_FORCE_PATH_STYLE: "true"
      LOG_PATH: /data/logs
      SECRETKEY_STORAGE_TYPE: local
      SECRETKEY_PATH: /data/secret
      FLOWISE_SECRETKEY_OVERWRITE: ${secret:FLOWISE_SECRET_KEY}

      LOG_LEVEL: info
      CUSTOM_MCP_SECURITY_CHECK: "true"
      HTTP_SECURITY_CHECK: "true"
