name: directus

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    volumes:
      - directus-data:/data
    environment:
      HOST: 0.0.0.0
      PORT: "8055"
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8055}
      SECRET: ${DIRECTUS_SECRET:-directus-local-secret}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-directus}
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /data/uploads
      WEBSOCKETS_ENABLED: "true"

volumes:
  db-data:
  directus-data:
