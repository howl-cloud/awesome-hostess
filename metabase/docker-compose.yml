name: metabase

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-metabase}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: "5432"
      MB_DB_DBNAME: ${POSTGRES_DB:-metabase}
      MB_DB_USER: postgres
      MB_DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost:3000}
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_ENCRYPTION_SECRET_KEY:-0123456789abcdef0123456789abcdef}
      MB_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@example.com}

volumes:
  db-data:
