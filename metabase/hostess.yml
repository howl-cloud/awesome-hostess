version: "1.0"
name: metabase
description: Metabase backed by Hostess-managed Postgres.

services:
  db:
    type: postgres
    retention: permanent
    resources:
      preset: large
      storage: 50Gi
    backups:
      schedule: daily
      retention: 14

  metabase:
    type: custom
    image: metabase/metabase:latest
    depends_on:
      - db
    ports:
      - port: 3000
        public: true
    resources: large
    health:
      http: /api/health
      interval: 15s
      timeout: 5s
      retries: 5
    env:
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${db.host}
      MB_DB_PORT: ${db.port}
      MB_DB_DBNAME: ${db.database}
      MB_DB_USER: postgres
      MB_DB_PASS: ${db.password}

      MB_SITE_URL: ${metabase.external_url}
      MB_ENCRYPTION_SECRET_KEY: ${secret:METABASE_ENCRYPTION_SECRET_KEY}
      MB_ADMIN_EMAIL: ${secret:METABASE_ADMIN_EMAIL}
