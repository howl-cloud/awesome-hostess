name: plane

x-plane-env: &plane-env
  DEBUG: "0"
  SECRET_KEY: ${PLANE_SECRET_KEY:-plane-local-secret-key}
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: ${PLANE_PUBLIC_URL:-http://localhost:8080}
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-plane}
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-plane}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_URL: redis://redis:6379/
  RABBITMQ_HOST: mq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: plane
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-plane}
  RABBITMQ_VHOST: plane
  AWS_REGION: garage
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-plane}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-plane-secret}
  AWS_S3_ENDPOINT_URL: http://plane-minio:9000
  AWS_S3_BUCKET_NAME: uploads
  FILE_SIZE_LIMIT: "5242880"
  SIGNED_URL_EXPIRATION: "3600"
  USE_MINIO: "1"
  MINIO_ENDPOINT_SSL: "0"
  WEB_URL: ${PLANE_PUBLIC_URL:-http://localhost:8080}
  APP_BASE_URL: ${PLANE_PUBLIC_URL:-http://localhost:8080}
  APP_BASE_PATH: /
  ADMIN_BASE_URL: ${PLANE_PUBLIC_URL:-http://localhost:8080}
  ADMIN_BASE_PATH: /god-mode
  SPACE_BASE_URL: ${PLANE_PUBLIC_URL:-http://localhost:8080}
  SPACE_BASE_PATH: /spaces
  LIVE_BASE_URL: ${PLANE_PUBLIC_URL:-http://localhost:8080}
  LIVE_BASE_PATH: /live
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY:-plane-live-secret}
  GUNICORN_WORKERS: "2"
  HARD_DELETE_AFTER_DAYS: "60"
  API_KEY_RATE_LIMIT: 60/minute

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-plane}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mq:
    image: rabbitmq:3.13.6-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: plane
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-plane}
      RABBITMQ_DEFAULT_VHOST: plane
      RABBITMQ_MNESIA_BASE: /data/mnesia
      RABBITMQ_LOG_BASE: /data/log
    volumes:
      - mq-data:/data
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  plane-minio:
    image: dxflrs/garage:v2.2.0
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu

        : "$${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}"
        : "$${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}"
        : "$${GARAGE_METRICS_TOKEN:?GARAGE_METRICS_TOKEN is required}"
        : "$${GARAGE_DEFAULT_ACCESS_KEY:?GARAGE_DEFAULT_ACCESS_KEY is required}"
        : "$${GARAGE_DEFAULT_SECRET_KEY:?GARAGE_DEFAULT_SECRET_KEY is required}"
        : "$${GARAGE_DEFAULT_BUCKET:?GARAGE_DEFAULT_BUCKET is required}"

        mkdir -p /data/meta /data/data

        cat >/etc/garage.toml <<EOF
        metadata_dir = "/data/meta"
        data_dir = "/data/data"
        db_engine = "sqlite"
        replication_factor = 1
        rpc_bind_addr = "[::]:3901"
        rpc_public_addr = "127.0.0.1:3901"
        rpc_secret = "$${GARAGE_RPC_SECRET}"

        [s3_api]
        s3_region = "$${GARAGE_S3_REGION:-garage}"
        api_bind_addr = "[::]:9000"
        root_domain = ".s3.garage.localhost"

        [s3_web]
        bind_addr = "[::]:3902"
        root_domain = ".web.garage.localhost"

        [admin]
        api_bind_addr = "[::]:3903"
        admin_token = "$${GARAGE_ADMIN_TOKEN}"
        metrics_token = "$${GARAGE_METRICS_TOKEN}"
        EOF

        export GARAGE_CONFIG_FILE=/etc/garage.toml

        exec /garage server --single-node --default-bucket
    ports:
      - "${PLANE_S3_PORT:-9000}:9000"
    volumes:
      - garage-data:/data
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-plane-minio-rpc-secret-32-bytes}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-plane-minio-admin-token}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN:-plane-minio-metrics-token}
      GARAGE_S3_REGION: garage
      GARAGE_DEFAULT_BUCKET: uploads
      GARAGE_DEFAULT_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-plane}
      GARAGE_DEFAULT_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-plane-secret}
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrator:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-migrator.sh
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mq:
        condition: service_healthy
      plane-minio:
        condition: service_healthy
    environment: *plane-env
    restart: "no"

  api:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-api.sh
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment: *plane-env

  worker:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-worker.sh
    depends_on:
      api:
        condition: service_started
    environment: *plane-env

  beat-worker:
    image: makeplane/plane-backend:v1.3.0
    command: ./bin/docker-entrypoint-beat.sh
    depends_on:
      api:
        condition: service_started
    environment: *plane-env

  web:
    image: makeplane/plane-frontend:v1.3.0
    depends_on:
      api:
        condition: service_started

  admin:
    image: makeplane/plane-admin:v1.3.0
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

  space:
    image: makeplane/plane-space:v1.3.0
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

  live:
    image: makeplane/plane-live:v1.3.0
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3000"
      API_BASE_URL: http://api:8000
      WEB_BASE_URL: ${PLANE_PUBLIC_URL:-http://localhost:8080}
      LIVE_BASE_URL: ${PLANE_PUBLIC_URL:-http://localhost:8080}
      LIVE_BASE_PATH: /live
      LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY:-plane-live-secret}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/

  proxy:
    image: makeplane/plane-proxy:v1.3.0
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
      space:
        condition: service_started
      admin:
        condition: service_started
      live:
        condition: service_started
      plane-minio:
        condition: service_healthy
    ports:
      - "${PLANE_PORT:-8080}:80"
    environment:
      FILE_SIZE_LIMIT: "5242880"
      BUCKET_NAME: uploads
      SITE_ADDRESS: :80
      TRUSTED_PROXIES: 0.0.0.0/0

volumes:
  db-data:
  redis-data:
  mq-data:
  garage-data:
