name: supabase-postgres

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-db}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  meta:
    image: supabase/postgres-meta:v0.96.3
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${POSTGRES_META_PORT:-8080}:8080"
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: ${POSTGRES_DB:-db}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY:-supabase-meta-local-crypto-key}

  rest:
    image: postgrest/postgrest:v14.8
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${POSTGREST_PORT:-3001}:3000"
    command:
      - postgrest
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-db}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_DB_MAX_ROWS: "1000"
      PGRST_DB_EXTRA_SEARCH_PATH: public
      PGRST_JWT_SECRET: ${JWT_SECRET:-supabase-local-jwt-secret}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  studio:
    image: supabase/studio:2026.04.27-sha-5f60601
    depends_on:
      - meta
      - rest
    ports:
      - "${SUPABASE_STUDIO_PORT:-3000}:3000"
    environment:
      HOSTNAME: 0.0.0.0
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY:-supabase-meta-local-crypto-key}
      DEFAULT_ORGANIZATION_NAME: Default Organization
      DEFAULT_PROJECT_NAME: Default Project
      SUPABASE_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:3000}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:3000}
      SUPABASE_ANON_KEY: ${ANON_KEY:-supabase-local-anon-key}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-supabase-local-service-role-key}
      AUTH_JWT_SECRET: ${JWT_SECRET:-supabase-local-jwt-secret}
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

volumes:
  db-data:
