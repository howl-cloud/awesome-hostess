api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  vector_internal:
    type: internal_logs

transforms:
  vector_logs:
    type: remap
    inputs:
      - vector_internal
    source: |
      .project = "default"
      .event_message = to_string!(.message)
      .appname = "supabase-vector"

sinks:
  logflare_vector:
    type: http
    inputs:
      - vector_logs
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 30
      retry_initial_backoff_secs: 1
    headers:
      x-api-key: ${LOGFLARE_PUBLIC_ACCESS_TOKEN?LOGFLARE_PUBLIC_ACCESS_TOKEN is required}
    uri: http://analytics:4000/api/logs?source_name=vector.logs
