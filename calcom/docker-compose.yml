name: calcom

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-calcom}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  calcom:
    image: calcom/cal.com:v6.2.0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CALCOM_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      LICENSE: agree
      NEXT_PUBLIC_LICENSE_CONSENT: agree
      NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000/api/auth}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-calcom-local-nextauth-secret}
      CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY:-calcom-local-encryption-key}
      DATABASE_HOST: db:5432
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-calcom}
      DATABASE_DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-calcom}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      GOOGLE_API_CREDENTIALS: "{}"
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Cal.com}
      EMAIL_FROM: ${EMAIL_FROM:-bookings@example.com}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-smtp.resend.com}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-resend}
      EMAIL_SERVER_PASSWORD: ${RESEND_API_KEY:-}
      CALCOM_TELEMETRY_DISABLED: "1"
      CSP_POLICY: ""
      NEXT_PUBLIC_API_V2_URL: ${NEXT_PUBLIC_API_V2_URL:-http://localhost:3000/api/v2}

volumes:
  db-data:
  redis-data:
